            { id: 5, part: 1, q: "กำลังขับรถอยู่ครับ คุยไม่ได้", a: "ขอโทษด้วยครับคุณสมชาย เพื่อความปลอดภัย คุณสมชาย สะดวกใช้สปิคเกอร์โฟนในรถเพื่อรับข้อมูลได้หรือไม่ครับ ถ้าไม่มีเดี๋ยวผมขออนุญาตติดต่อกลับหาคุณสมชาย อีกครั้งในช่วงเวลาที่สะดวกดีไหมครับ?", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/1_5.wav" },

            { id: 11, part: 1, q: "เอาเบอร์มาจากไหน บอกมาสิ?", a: "เราเป็นพันธมิตรกับสถาบันการเงินที่คุณสมชาย ใช้งานอยู่ครับ จึงได้รับสิทธิในการมอบโครงการพิเศษนี้ให้คุณสมชาย ครับ สะดวกรับข้อมูลสักครุ่นะครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/1_11.wav" },

            { id: 25, part: 1, q: "ต้องตรวจสุขภาพไหม?", a: "แผนนี้ส่วนใหญ่ไม่ต้องตรวจสุขภาพครับคุณ... เพียงแค่ตอบคำถามสุขภาพตามความเป็นจริงก็สมัครได้เลยครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part1/P1Q25/Sornkornchon_P1_P1Q25_1763382417117.webm" },
            { id: 26, part: 1, q: "ถ้าทำแล้วเสียชีวิต ได้เงินเท่าไหร่?", a: "มีทุนประกันชีวิตมอบให้ครอบครัวแน่นอนครับคุณ... เพื่อเป็นมรดกและความมั่นคงให้กับคนที่ท่านห่วงใยครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part1/P1Q26/Sornkornchon_P1_P1Q26_1763382417117.webm" },
            { id: 27, part: 1, q: "ค่าเบี้ยจะเพิ่มขึ้นทุกปีไหม?", a: "เบี้ยประกันสุขภาพมักจะปรับตามช่วงอายุครับคุณ... แต่การเริ่มตอนนี้จะได้รับสิทธิประโยชน์ที่คุ้มค่ากว่าเริ่มตอนอายุมากขึ้นครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part1/P1Q27/Sornkornchon_P1_P1Q27_1763382417117.webm" },
            { id: 28, part: 1, q: "มีโรคประจำตัวสมัครได้จริงเหรอ?", a: "สมัครได้ครับคุณ... แต่ต้องแถลงข้อมูลตามจริง เดี๋ยวผมช่วยเช็คเงื่อนไขให้ครับว่าโรคที่เป็นอยู่ครอบคลุมในส่วนไหนบ้าง", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part1/P1Q28/Sornkornchon_P1_P1Q28_1763382417117.webm" },
            { id: 29, part: 1, q: "มีระยะเวลารอคอยนานแค่ไหน?", a: "โดยปกติอุบัติเหตุคุ้มครองทันที ส่วนโรคทั่วไปจะมีระยะเวลารอคอยตามมาตรฐาน 30 วันครับคุณ...", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part1/P1Q29/Sornkornchon_P1_P1Q29_1763382417117.webm" },
            { id: 30, part: 1, q: "สุดท้ายก็เหมือนๆ กันทุกบริษัทแหละ", a: "มีความคล้ายกันครับคุณ... แต่จุดที่ทำให้เราแตกต่างคือความรวดเร็วในการเคลมและการดูแลที่ใกล้ชิดครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part1/P1Q30/Sornkornchon_P1_P1Q30_1763384465638.webm" },

            // --- PART 2: การจัดการข้อโต้แย้ง/เงื่อนไข (31-60) ---
            { id: 31, part: 2, q: "เป็นเบาหวานทำได้ไหม?", a: "ทำได้ครับคุณ... แต่เราจะขอข้อมูลเพิ่มเติมเกี่ยวกับระดับน้ำตาล เพื่อส่งพิจารณาให้คุณ... เป็นกรณีพิเศษครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q1/TT_K_P2_P2Q1_1763188237484.webm" },
            { id: 32, part: 2, q: "เคยผ่าตัดไส้ติ่งมาเมื่อ 2 ปีก่อน", a: "ถ้าหายขาดแล้วไม่มีปัญหาเลยครับคุณ... ถือเป็นประวัติสุขภาพทั่วไปที่แจ้งให้บริษัททราบได้เลยครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q2/TT_K_P2_P2Q2_1763190362841.webm" },
            { id: 33, part: 2, q: "ต้องสำรองจ่ายก่อนไหม?", a: "ถ้าเข้าโรงพยาบาลในเครือคู่สัญญา คุณ... ไม่ต้องสำรองจ่ายครับ เพียงยื่นบัตรใบเดียวก็จัดการได้เลย", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q3/TT_K_P2_P2Q3_1763191428994.webm" },
            { id: 34, part: 2, q: "คุ้มครองค่าห้องวันละเท่าไหร่?", a: "แผนที่คุณ... สนใจ คุ้มครองค่าห้องสูงสุดถึงวันละ 5,000 บาทครับ ครอบคลุมโรงพยาบาลเอกชนชั้นนำได้สบายครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q4/TT_K_P2_P2Q4_1763231134399.webm" },
            { id: 35, part: 2, q: "รวมค่าล้างไตด้วยไหม?", a: "มีบางแผนที่ครอบคลุมโรคร้ายแรงรวมถึงการล้างไตด้วยครับคุณ... เดี๋ยวผมเช็ครายละเอียดในเล่มกรมธรรม์ให้คุณ... อีกครั้งครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q5/TT_K_P2_P2Q5_1763231416734.webm" },
            { id: 36, part: 2, q: "ถ้าเกิดอุบัติเหตุในต่างประเทศเคลมได้ไหม?", a: "คุ้มครองทั่วโลกในกรณีอุบัติเหตุฉุกเฉินครับคุณ... สามารถนำใบเสร็จมาเบิกคืนตามวงเงินได้เลยครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q6/TT_K_P2_P2Q6_1763231569169.webm" },
            { id: 37, part: 2, q: "ต้องนอนโรงพยาบาลกี่ชั่วโมงถึงจะเบิกได้?", a: "โดยปกติคือ 6 ชั่วโมงขึ้นไปในฐานะผู้ป่วยในครับคุณ... แต่ถ้าเป็นอุบัติเหตุฉุกเฉิน ไม่ต้องนอนก็เบิกค่ารักษาได้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q7/TT_K_P2_P2Q7_1763231654753.webm" },
            { id: 38, part: 2, q: "เบิกค่าชดเชยรายวันได้สูงสุดกี่วัน?", a: "เบิกได้สูงสุดถึง 365 วันต่อการเจ็บป่วยครั้งนั้นๆ เลยครับคุณ... ช่วยให้คุณ... ไม่ต้องกังวลเรื่องขาดรายได้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q8/TT_K_P2_P2Q8_1763232152318.webm" },
            { id: 39, part: 2, q: "คุ้มครองโรคมะเร็งทุกระยะไหม?", a: "แผนโรคร้ายแรงของเราคุ้มครองตั้งแต่ระยะเริ่มต้นไปจนถึงระยะรุนแรงเลยครับคุณลูกค้า", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q9/TT_K_P2_P2Q9_1763231884353.webm" },
            { id: 40, part: 2, q: "ถ้าลาออกจากงาน ประกันนี้ยังอยู่ไหม?", a: "อยู่ครับคุณ... เพราะเป็นประกันส่วนบุคคล ไม่ได้ผูกติดกับสวัสดิการบริษัท คุณ... สามารถถือความคุ้มครองนี้ได้ตลอดครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q10/TT_K_P2_P2Q10_1763232367832.webm" },
            { id: 41, part: 2, q: "ชำระเบี้ยรายเดือนหรือรายปีดีกว่ากัน?", a: "รายปีมักจะมีส่วนลดให้ครับคุณ... แต่รายเดือนจะช่วยให้คุณ... บริหารเงินคล่องตัวกว่า คุณ... สะดวกแบบไหนมากกว่าครับ?", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q11/TT_K_P2_P2Q11_1763191824919.webm" },
            { id: 42, part: 2, q: "ถ้าจ่ายเบี้ยไม่ไหว ขอลดวงเงินได้ไหม?", a: "ได้ครับคุณ... ในอนาคตสามารถขอปรับลดแผนเพื่อให้สอดคล้องกับงบประมาณที่มีได้เสมอครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q12/TT_K_P2_P2Q12_1763191914242.webm" },
            { id: 43, part: 2, q: "กรมธรรม์ส่งมาที่บ้านภายในกี่วัน?", a: "ภายใน 7-15 วันทำการหลังจากอนุมัติครับ คุณ... จะได้รับเล่มกรมธรรม์ตัวจริงไปตรวจสอบครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q13/TT_K_P2_P2Q13_1763192130890.webm" },
            { id: 44, part: 2, q: "ถ้าข้อมูลในกรมธรรม์ผิด ต้องทำยังไง?", a: "คุณ... สามารถแจ้งขอแก้ไขได้ทันทีครับ เรามีเจ้าหน้าที่ดูแลประสานงานให้ฟรีไม่มีค่าใช้จ่ายครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q14/TT_K_P2_P2Q14_1763192288238.webm" },
            { id: 45, part: 2, q: "มีค่ารักษาพยาบาลแบบผู้ป่วยนอก (OPD) ไหม?", a: "มีครับคุณ... สำหรับแผนที่รวม OPD คุณ... สามารถหาหมอรับยาแล้วกลับบ้านได้เลยโดยไม่ต้องนอนโรงพยาบาลครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q15/TT_K_P2_P2Q15_1763192435378.webm" },
            { id: 46, part: 2, q: "ตรวจเจอว่าเป็นโรคหลังจากทำประกัน เคลมได้ไหม?", a: "ถ้าพ้นระยะเวลารอคอยแล้ว และตรวจเจอภายหลัง เคลมได้แน่นอน 100% ครับคุณ...", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q16/TT_K_P2_P2Q16_1763192672186.webm" },
            { id: 47, part: 2, q: "ถ้าเป็นโควิด-19 คุ้มครองไหม?", a: "คุ้มครองครับคุณ... ทั้งค่ารักษาพยาบาลและค่าชดเชยรายวันตามเงื่อนไขของผู้ป่วยในครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q17/TT_K_P2_P2Q17_1763232779144.webm" },
            { id: 48, part: 2, q: "ครอบคลุมการรักษาทางเลือกอย่างฝังเข็มไหม?", a: "แผนส่วนใหญ่จะเน้นการรักษาแผนปัจจุบันครับ แต่บางแผนพิเศษอาจจะครอบคลุม เดี๋ยวผมตรวจสอบให้คุณ... ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q18/TT_K_P2_P2Q18_1763232939054.webm" },
            { id: 49, part: 2, q: "สมัครให้คนอื่นได้ไหม เช่น พ่อแม่?", a: "ได้ครับคุณ... คุณ... สามารถเป็นผู้ชำระเบี้ยให้กับบุคคลในครอบครัวได้ เพื่อมอบความมั่นคงให้พวกท่านครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part2/P2Q19/TT_K_P2_P2Q19_1763233003764.webm" },
            { id: 50, part: 2, q: "ชำระเบี้ยรายเดือนหรือรายปีดีกว่ากัน?", a: "รายปีจะมีส่วนลด7-8%ให้ครับ แต่รายเดือนจะช่วยให้บริหารเงินคล่องตัวกว่า คุณลูกค้า สะดวกแบบไหนมากกว่าครับ?", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_41.wav" },
            { id: 51, part: 2, q: "ชำระเบี้ยรายเดือนหรือรายปีดีกว่ากัน?", a: "รายปีจะมีส่วนลด7-8%ให้ครับ แต่รายเดือนจะช่วยให้บริหารเงินคล่องตัวกว่า คุณลูกค้า สะดวกแบบไหนมากกว่าครับ?", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_41.wav" },
            { id: 52, part: 2, q: "ถ้าจ่ายเบี้ยไม่ไหว ขอลดวงเงินได้ไหม?", a: "จริงๆก็สามารถทำได้อาจจะปรับจากรายปีเป็นรายเดือน หากสะดวกขึ้นแล้วในปีถัดไปก็สามารถแจ้งปรับเบี้ยเป็นรายปีตามปกติได้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_42.wav" },
            { id: 53, part: 2, q: "IRR โครงการนี้เท่าไหร่ ?", a: "ทางโครงการไม่ได้คิดเรท IRR ไว้ครับ ก็ต้องยอมรับก่อนครับว่าการทำประกันชีวิตจะเปรียบเทียบกับผลตอบแทนการลงทุนไม่ได้ครับ แต่จะให้ความมั่นคงและอุ่นใจมากกว่าไม่ว่าอยู่หรือจากไปครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_43.wav" },
            { id: 54, part: 2, q: "ส่งเบี้ยไม่ไหวยกเลิกได้ใช่ไหม ต้องทำยังไง?", a: "ประกันชีวิตสะสมทรัพย์เป็นการชำระเบี้ยตามระยะเวลาที่กำหนดและจะได้ผลตอบแทนตามเงื่อนไข แต่เกิดกรณีส่งเบี้ยไม่ไหวยกเลิกก่อนจะทำให้ได้รับเงินคืนไม่ครบตามเงื่อนไขจะได้เฉพาะมูลค่าเวนคืนกรมธรรม์ในปีนั้นๆ คืนเท่านั้นครับ หากอนาคตส่งเบี้ยไม่ไหวโทรปรึกษาได้ที่ 1621 นะครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_44.wav" },
            { id: 55, part: 2, q: "ถ้าไม่รับเงินคืนต่อปีที่โครงการคืนให้สามารถฝากไว้ได้ไหม?", a: "อันนี้แนะนำให้รับคืนไปทำประโยชน์ดีว่าครับเพราะฝากไว้ก็ไม่ได้อะไรเพิ่มเอาไปชำระเบี้ยปีต่อก้ได้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_45.wav" },
            { id: 56, part: 2, q: "เบี้ยลดหย่อนภาษีได้ไหม?", a: "หากภาษีแสนแรกยังไม่เต็ม ลูกค้าสามารถนำเบี้ยไปลดหย่อนภาษีได้ตามที่จ่ายจริงสูงสุดไม่เกิน 100,000 บาท ลูกค้าประสงค์จะนำเบี้ยไปลดหย่อนภาษีใช่ไหมเดี๋ยวผมจัดการให้เลยครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_46.wav" },
            { id: 57, part: 2, q: "ส่งเบี้ยมาจนเบี้ยมากกว่าทุนหากสูญเสียชีวิตก็ไม่คุ้มค่า?", a: "จริงๆ เรื่องนี้ไม่ต้องกังวลครับ เพราะโครงการนี้ไม่เอาเปรียบลูกค้าแน่นอน เมื่อไหร่ก็ตามที่เบี้ยหรือมูลค่าในกรมธรรม์มากว่าทุน ทางโครงการจะจ่ายจำนวนที่มากว่าเสมอให้กับผู้รับประโยชน์ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_47.wav" },
            { id: 58, part: 2, q: "ต้องมีเงินนอนนิ่งไว้ถึงจะทำได้เพราะเวลาต้องการใช้เงินมันเอาออกมาไช้ไม่ได้?", a: "อธิบายอย่างนี้นะครับ ถ้ามีความจำเป็นต้องใช้เงินเร่งด่วนสามารถนำกรมธรรม์มาเป็นหลักประกันเพื่อกู้เงินจากบริษัทไปใช้ก่อนได้ อาจจะได้ที่ 90 % ของมูลค่ากรมธรรม์นะครับ มีดอกเบี้ยน้อยมากไม่เกิน 8 % ต่อปีเท่าน้ั้น ที่สำคัญความคุ้มครองยังอยู่เงินคืนก็ไยังได้คืนปกติครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_48.wav" },
            { id: 59, part: 2, q: "ต้องจ่ายเบี้ยเมื่อไหร่?", a: "ภายหลังที่ลูกค้าสมัคร ผ่านการพิจารณาจะมีการเรียกเก็บเบี้ยเข้าไป ลูกค้าสามารถจ่ายตามรอบบัญชีได้เลย", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_49.wav" },
            { id: 60, part: 2, q: "มีข้อยกเว้นอะไรบ้าง?", a: "ข้อยกเว้นทั่วไป ห้ามฆ่าตัวตายปีแรกห้ามถูกผู้รับประโยชน์ฆ่าตายโดยเจตนา และ สำหรับข้อยกเว้นอุบัติเหตุ ไม่คุ้มครองการขับขี่โดยสาร รถจักยานยนต์ หรือมีแอลกอฮอลในเลือดมากกว่า150 มิลิกรัม%ขึ้นไปครับ ลูกค้าสามารถศึกษารายละเอียดทั้งหมดได้ที่กรมธรรม์นะครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_50.wav" },

            // --- PART 3: การปิดการขาย (61-90) ---
            { id: 61, part: 3, q: "ยังก่อนดีกว่า,ขอคิดดูก่อน", a: "ครับฟังรายละเอียดตัวโครงการแล้วคิดเห็นยังไงบ้างครับ ดีใช่มั้ยครับ ผมถามนิดนึง เบี้ยประกันที่ผมแจ้งมีผลต่อการตัดสินใจไหมครับ ถ้ามีเดี๋ยวผมดูเบี้ยที่เหมาะสมกว่านี้ให้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_1.wav" },
            { id: 62, part: 3, q: "ยินดีครับคุณสมชาย แต่ส่วนใหญ่พอวางสายไปแล้วมักจะยุ่งจนลืม คุณสมชายสงสัยตรงไหนไหมครับ ผมอธิบายให้เคลียร์ตอนนี้เลยอย่างที่แจ้งครับถ้าหากกลับไปคิดก็อาจจะลืมรายละเอียดไปและอาจทำให้พลาดโอกาสที่จะตอบรับโครงการดีๆไปนะครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_2.wav" },
            { id: 63, part: 3, q: "ส่งเอกสารมาให้อ่านก่อนค่อยสมัคร", a: "อย่างที่เรียนแจ้ง ตั้งแต่ต้นสายครับ เนื่องจากเป็นโครงการพิเศษ ที่ให้เจ้าหน้าที่เฉพาะด้านโทรมา นำเสนอข้อมูลไม่มีเอกสารที่เป็นโบชัวร์จัดส่งให้ แต่หากลูกค้าฟังข้อมูลส่วนใดไม่ชัดเจนสอบถามเพิ่มเติมได้เลยนะครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_3.wav" },
            { id: 64, part: 3, q: "เดี๋ยวถามที่บ้านก่อน ถ้าเขาโอเคจะโทรกลับ", a: "จริงๆแล้ว คุณสมชาย สามารถพิจารณาไปด้วยกันได้นะครับ หากฟังโครงการแล้วชอบเบี้ยประกันไม่มีผลกระทบกับค่าใช้ช่าย แจ้งเป็นข่าวดีให้คนในบ้านทราบได้เลยว่าคุณ... ได้เตรียมสวัสดิการที่ดีไว้ให้ครอบครัวแล้ว", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_4.wav" },
            { id: 65, part: 3, q: "ปีหน้าค่อยทำละกัน", a: "ปีหน้าเบี้ยจะมีการปรับเพิ่มขึ้นตามอายุของเราที่เพิ่มขึ้นและเราไม่รู้ว่าสุขภาพจะเป็นอย่างไร การทำตอนนี้คือการตัดสินใจที่ดีที่สุด ที่คุณสมชายทำเพื่อครอบครัวและตัวเองครับ เรียนเชิญไว้ด้วยกันเลยครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_5.wav" },
            { id: 66, part: 3, q: "ขอเปรียบเทียบกับเจ้าอื่นก่อนนะ", a: "การเปรียบเทียบเป็นเรื่องดีครับ แต่แผนนี้เป็นโควต้าพิเศษสำหรับคุณ... ตอนนี้เท่านั้น คุณ... อาจจะหาจากที่อื่นไม่ได้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_6.wav" },
            { id: 67, part: 3, q: "ไม่มีบัตรเครดิต ทำได้ไหม?", a: "ถ้าไม่มีบัตรเครดิตจะยังไม่สามารถเข้าร่วมโครงการได้ครับ ต้องขอโทษด้วยครับ แต่ถ้าหากคนในครอบครัว ของลูกค้ามีบัตรเครดิต ก็สามารถชำระเบี้ยประกันให้กับลูกค้าได้นะครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_7.wav" },
            { id: 68, part: 3, q: "ทำไมต้องตัดสินใจตอนนี้เลย?", a: "เพราะสุขภาพและความเสี่ยงรอไม่ได้นะครับ เพราะฉนั้น การตอบรับสิทธิ์ตอนที่ร่างกายยังแข็งแรงคือจังหวะที่ดีที่สุดครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_8.wav" },
            { id: 69, part: 3, q: "เบี้ยแพงไปหน่อย ลดกว่านี้ได้ไหม?", a: "จริงๆถ้ามองจากผลประโยชน์ที่ได้รับก็ถือว่าคุ้มค่านะครับ แต่เพื่อให้เหมาะสมกับลูกค้าและไม่หนักเกินไปเดี๋ยวผมลองปรับแผนให้ครับ เบี้ยลดลงแน่นอนแต่ความคุ้มครองยังคุ้มค่าเหมือนเดิมครับ หากเป็นเรทนี้ ลูกค้าสะดวกขึ้นนะครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_9.wav" },
            { id: 70, part: 3, q: "กลัวโดนหลอก ไม่กล้าทำทางโทรศัพท์", a: "เข้าใจครับคุณสมชาย หากไม่มั่นใจ คุณสมชาย สามารถจดชื่อและเลขที่ใบอนุญาตของผมไปเช็คกับ คปภ.ได้ทันทีเพื่อความสบายใจครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/Trainer%20Voice/E%20testing%20voice/2_10.wav" },
            { id: 71, part: 3, q: "แฟนไม่ให้ทำแน่ๆ เลย", a: "ลองคุยกันดูครับคุณ... แต่ถ้าบอกว่าคุณ... ทำเพื่อลดภาระค่าใช้จ่ายของครอบครัว ผมเชื่อว่าทางครอบครัวคุณ... ต้องเห็นด้วยครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q11/Sornkornchon_P3_P3Q11_1763385056099.webm" },
            { id: 72, part: 3, q: "เคยทำแล้วเคลมไม่ได้ เลยไม่อยากทำอีก", a: "นั่นเป็นเหตุผลที่ผมต้องเน้นถามคำถามสุขภาพให้ชัดเจนวันนี้ เพื่อให้ตอนคุณ... เคลมจะไม่มีปัญหาเหมือนครั้งก่อนครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q12/Sornkornchon_P3_P3Q12_1763385056099.webm" },
            { id: 73, part: 3, q: "ยังแข็งแรงดีอยู่ ไม่จำเป็นต้องใช้", a: "ประกันทำตอนแข็งแรงดีที่สุดครับคุณ... เพราะถ้าเจ็บป่วยแล้วจะทำไม่ได้เลย ถึงตอนนั้นจำเป็นแค่ไหนเงินก็ซื้อไม่ได้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q13/Sornkornchon_P3_P3Q13_1763385056099.webm" },
            { id: 74, part: 3, q: "ขอเอกสารมาอ่านก่อนค่อยสมัคร", a: "ในระบบโทรศัพท์เราจะส่งเล่มจริงให้คุณ... อ่านหลังสมัครครับ คุณ... มีสิทธิยกเลิกและรับเงินคืนได้ใน 15 วันถ้าไม่พอใจครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q14/Sornkornchon_P3_P3Q14_1763385056099.webm" },
            { id: 75, part: 3, q: "เบี้ยจ่ายทิ้งเปล่าๆ เสียดายตังค์", a: "เหมือนการซื้อความอุ่นใจครับคุณ... จ่ายน้อยเพื่อป้องกันความเสี่ยงที่อาจต้องจ่ายมหาศาลในอนาคตครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q15/Sornkornchon_P3_P3Q15_1763385056099.webm" },
            { id: 76, part: 3, q: "ไม่มีบัตรเครดิต ทำได้ไหม?", a: "ทำได้ครับคุณ... สามารถชำระผ่านแอปธนาคารหรือเคาน์เตอร์เซอร์วิสได้ สะดวกมากครับสำหรับคุณลูกค้า", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q16/Sornkornchon_P3_P3Q16_1763385056099.webm" },
            { id: 77, part: 3, q: "กลัวบริษัทล้มละลายแล้วไม่ได้เงิน", a: "เราเป็นบริษัทใหญ่ที่มีเงินกองทุนสำรองตามกฎหมาย คปภ. ควบคุมเคร่งครัดมาก คุณ... มั่นใจได้ 100% ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q17/Sornkornchon_P3_P3Q17_1763385056099.webm" },
            { id: 78, part: 3, q: "คุยนานแล้วนะ สรุปเบี้ยเท่าไหร่กันแน่?", a: "เบี้ยสำหรับคุณ... อยู่ที่เดือนละ XXX บาทครับ ซึ่งถือว่าคุ้มค่ามากเมื่อเทียบกับวงเงินรักษาที่คุณ... จะได้รับครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q18/Sornkornchon_P3_P3Q18_1763385056099.webm" },
            { id: 79, part: 3, q: "ถ้าคุ้มครองดีจริง ทำไมต้องโทรมาขาย?", a: "เพราะเราต้องการเข้าถึงลูกค้าโดยตรงเพื่อมอบสิทธิประโยชน์กลับคืนให้คุณ... ได้มากกว่าช่องทางอื่นครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q19/Sornkornchon_P3_P3Q19_1763385056099.webm" },
            { id: 80, part: 3, q: "เอาเบอร์มาจากไหน บอกมาสิ?", a: "เราเป็นพันธมิตรกับสถาบันการเงินที่คุณ... ใช้งานอยู่ครับ จึงได้รับสิทธิในการมอบโครงการพิเศษนี้ให้คุณ... ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q20/Sornkornchon_P3_P3Q20_1763385056099.webm" },
            { id: 81, part: 3, q: "ถ้าผมทำแล้ว คุณจะได้อะไร?", a: "ผมได้ความภูมิใจที่ได้มอบความคุ้มครองที่ดีให้กับคุณ... ครับ และหน้าที่ของผมคือดูแลคุณ... ให้ดีที่สุดครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q21/Sornkornchon_P3_P3Q21_1763385056099.webm" },
            { id: 82, part: 3, q: "มีคนโทรมาเยอะมาก เลือกไม่ถูก", a: "พิจารณาที่ความคุ้มครองและความน่าเชื่อถือครับคุณ... ซึ่งแผนที่เสนอวันนี้ตอบโจทย์ทั้งสองอย่างเพื่อคุณ... ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q22/Sornkornchon_P3_P3Q22_1763385056099.webm" },
            { id: 83, part: 3, q: "ประกันแบบนี้เคลมยากกว่าปกติไหม?", a: "ไม่เลยครับ มาตรฐานการเคลมเหมือนกันทุกช่องทาง และปัจจุบันเรามีระบบออนไลน์ที่สะดวกสำหรับคุณ... มากครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q23/Sornkornchon_P3_P3Q23_1763385056099.webm" },
            { id: 84, part: 3, q: "ขอปรึกษาหมอก่อนว่าต้องทำไหม", a: "แพทย์คงแนะนำให้ทำแน่นอนครับคุณ... เพราะท่านเห็นคนไข้ที่ต้องลำบากเพราะไม่มีประกันมาเยอะแล้วครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q24/Sornkornchon_P3_P3Q24_1763385056099.webm" },
            { id: 85, part: 3, q: "สมัครแล้วคุ้มครองกี่ปี?", a: "คุ้มครองแบบปีต่อปี และคุณ... สามารถต่ออายุได้ยาวนานจนถึงอายุ 80 ปีเลยครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q25/Sornkornchon_P3_P3Q25_1763385056099.webm" },
            { id: 86, part: 3, q: "ถ้าผมเปลี่ยนเบอร์โทรศัพท์ จะทำยังไง?", a: "คุณ... สามารถแจ้งผ่าน Call Center หรือแอปฯ ของบริษัทได้ตลอด 24 ชั่วโมงเพื่ออัปเดตข้อมูลครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q26/Sornkornchon_P3_P3Q26_1763385056099.webm" },
            { id: 87, part: 3, q: "ต้องจ่ายเงินงวดแรกตอนไหน?", a: "หลังจากคุณ... ตกลงยืนยันข้อมูล ระบบจะดำเนินการตามรอบที่คุณ... สะดวกแจ้งไว้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q27/Sornkornchon_P3_P3Q27_1763385056099.webm" },
            { id: 88, part: 3, q: "พูดยังไงก็ไม่อยากทำ", a: "รับทราบครับคุณ... แต่อยากให้ท่านเก็บข้อมูลนี้ไว้ก่อน เผื่อในอนาคตคุณ... ต้องการความคุ้มครอง ผมยินดีรับใช้ครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q28/Sornkornchon_P3_P3Q28_1763385056099.webm" },
            { id: 89, part: 3, q: "เดี๋ยวถามที่บ้านก่อน ถ้าเขาโอเคจะโทรกลับ", a: "คุณ... สามารถแจ้งเป็นข่าวดีให้คนในบ้านทราบได้นะครับ ว่าคุณ... ได้เตรียมสวัสดิการที่ดีไว้ให้ครอบครัวแล้ว", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q29/Sornkornchon_P3_P3Q29_1763385056099.webm" },
            { id: 90, part: 3, q: "โอเค ตกลงทำครับ ต้องทำยังไงบ้าง?", a: "ยินดีด้วยครับคุณ... เป็นการตัดสินใจที่ยอดเยี่ยมมาก เดี๋ยวผมขออนุญาตบันทึกเสียงเพื่อยืนยันสิทธิและรักษาสิทธิประโยชน์ให้คุณลูกค้าตามขั้นตอนนะครับ", audioUrl: "https://wzwyotzzxycqfwercakh.supabase.co/storage/v1/object/public/responses/part3/P3Q30/TT_K_P3_P3Q30_1763233856279.webm" }
        ];
        
        // ใช้ scripts ถ้ามีข้อมูล ถ้าไม่มีใช้ demoData (กัน Error)
        const activeScripts = (scripts.length > 1) ? scripts : demoData;

        // --- Functions ---
        
        function showPart(partNumber) {
            const questionArea = document.getElementById('questionArea');
            questionArea.innerHTML = '';
            
            const filteredScripts = activeScripts.filter(s => s.part === partNumber);
            const partName = (partNumber === 1) ? "Nursery (Part 1)" : (partNumber === 2) ? "New Onboarding (Part 2)" : "New TSRs (Part 3)";
            
            if (filteredScripts.length === 0) {
                questionArea.innerHTML = `<div class="alert alert-warning">ไม่พบรายการข้อโต้แย้งสำหรับ Part ${partNumber} (กรุณาตรวจสอบ Data ใน Code)</div>`;
                return;
            }

            questionArea.innerHTML += `<h3 class="text-center text-secondary mb-4">แสดงชุดฝึกอบรม: ${partName}</h3>`;

            filteredScripts.forEach((script) => {
                const globalIndex = script.id; // Use ID as index
                const item = document.createElement('div');
                item.className = 'question-item';

                const isPlaceholder = script.audioUrl.includes('placeholder.com');
                
                let audioButtonHtml = '';
                if (!isPlaceholder) {
                    audioButtonHtml = `<button class="play-audio-btn" onclick="playAudio(${globalIndex})">
                                        <i class="fas fa-volume-up"></i> ฟังเสียงตัวอย่าง
                                    </button>`;
                } else {
                    audioButtonHtml = `<span class="text-muted placeholder-link"><i class="fas fa-exclamation-circle me-1"></i> (ไม่มีไฟล์เสียง)</span>`;
                }

                // ** KEY FIX for iOS: Removed type="audio/mpeg" to let browser detect webm/mp4 automatically **
                item.innerHTML = `
                    <div class="question-title">
                        <i class="fas fa-comment-dots text-danger me-2"></i> ${globalIndex}. ลูกค้าโต้แย้ง: **"${script.q}"**
                    </div>
                    <div class="d-flex align-items-center mb-2">
                        ${audioButtonHtml}
                        <button class="btn btn-outline-secondary btn-sm ms-3" onclick="toggleAnswer(${globalIndex})">
                            <i class="fas fa-eye"></i> ดู/ซ้อมคำตอบ
                        </button>
                    </div>
                    <div id="answer-${globalIndex}" class="answer-area">
                        <p><strong>คำตอบพนักงาน:</strong> ${script.a}</p>
                        <div class="audio-container">
                           <audio id="audio-${globalIndex}" controls class="w-100" playsinline>
                                <source src="${script.audioUrl}"> 
                                เบราว์เซอร์ของคุณไม่รองรับการเล่นไฟล์เสียง
                            </audio>
                        </div>
                    </div>
                `;
                questionArea.appendChild(item);
            });
        }

        function initializeSimulator() {
            const partButtonsDiv = document.getElementById('partButtons');
            // Mock parts for initialization
            const parts = [1, 2, 3];
            
            parts.forEach(part => {
                const button = document.createElement('button');
                button.className = 'btn btn-outline-primary part-button';
                button.textContent = `Part ${part}`;
                button.onclick = () => showPart(part); 
                partButtonsDiv.appendChild(button);
            });
            showPart(1); // Default Load
        }

        function toggleAnswer(index) {
            const answerDiv = document.getElementById(`answer-${index}`);
            if (answerDiv) {
                const isVisible = answerDiv.style.display === 'block';
                answerDiv.style.display = isVisible ? 'none' : 'block';
                if (isVisible) stopAudio(index);
            }
        }

        function playAudio(index) {
            // Stop others
            document.querySelectorAll('audio').forEach(a => {
                if (a.id !== `audio-${index}`) {
                    a.pause();
                    a.currentTime = 0;
                }
            });

            const player = document.getElementById(`audio-${index}`);
            const answerDiv = document.getElementById(`answer-${index}`);
            
            // Auto open answer to show player
            if (answerDiv.style.display !== 'block') {
                answerDiv.style.display = 'block';
            }
            
            if (player) {
                player.play().catch(e => alert("ไม่สามารถเล่นไฟล์เสียงได้: " + e.message));
            }
        }

        function stopAudio(index) {
            const player = document.getElementById(`audio-${index}`);
            if (player) { player.pause(); player.currentTime = 0; }
        }

        document.addEventListener('DOMContentLoaded', initializeSimulator);

    </script>
</body>
</html>
